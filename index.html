<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Girl Catcher Ultimate</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Girls Catcher</h1>
  <p>Train Your Nerves. Control The Room.</p>
</header>

<main>
  <section id="dashboard">
    <h2>Dashboard</h2>
    <p>Level: <span id="level">1</span></p>
    <p>Level Name: <span id="levelName">Observer</span></p>
    <p>Streak: <span id="streak">0</span></p>
    <p>Fear Score: <span id="fearScore">5</span></p>
    <p>Daily Mission: <span id="dailyMissionText">Complete a mission to train your nerves</span></p>
    <button id="dailyMissionBtn">Start Mission</button>
  </section>

  <section id="scenarioEngine" style="display:none;">
    <h2>Scenario</h2>
    <p id="scenarioText"></p>
    <div id="options"></div>
    <button id="nextScenarioBtn" style="display:none;">Next Scenario</button>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
